name: Report Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

permissions:
  contents: write

jobs:
  run-report-digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r report_digest/requirements.txt

      - name: Run digest
        env:
          REPORT_DIGEST_CONFIG: report_digest/config.github.json
        run: python report_digest/main.py

      - name: Publish web assets
        run: python report_digest/publish_web_assets.py

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report_digest/output report_digest/state web/public/generated
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh report digest outputs"
          git push
